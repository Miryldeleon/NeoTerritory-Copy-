apiVersion: v1
kind: Service
metadata:
  name: neoterritory-session-{{user_id}}
  labels:
    app: neoterritory-session
    user_id: "{{user_id}}"
spec:
  type: NodePort
  selector:
    app: neoterritory-session
    user_id: "{{user_id}}"
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
